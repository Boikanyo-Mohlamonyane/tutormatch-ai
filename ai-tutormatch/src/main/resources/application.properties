
spring.application.name=ai-tutormatch

# ==========================================
# Database Configuration
# ==========================================
# Uses localhost when running from your IDE.
# Uses Docker environment variables when running with Docker Compose.
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/ai_tutormatch_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:root}
spring.datasource.driver-class-name=org.postgresql.Driver

# ==========================================
# JPA / Hibernate Configuration
# ==========================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# ==========================================
# Machine Learning Service
# ==========================================
# Uses localhost during development.
# Docker Compose overrides this with http://ml:5000
ml.service.url=${ML_SERVICE_URL:http://localhost:5000}
spring.security.debug=true
