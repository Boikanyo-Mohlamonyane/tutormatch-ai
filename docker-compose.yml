version: "3.9"

services:

  ####################################################
  # PostgreSQL Database
  ####################################################
  postgres:
    image: postgres:16-alpine
    container_name: ai-postgres

    restart: unless-stopped

    environment:
      POSTGRES_DB: ai_tutormatch
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password

    volumes:
      - postgres_data:/var/lib/postgresql/data

    expose:
      - "5432"

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ai_tutormatch"]
      interval: 10s
      timeout: 5s
      retries: 5

  ####################################################
  # AI Machine Learning Service
  ####################################################
  ml:
    build:
      context: ./ai-tutormatchML

    container_name: ai-ml

    restart: unless-stopped

    expose:
      - "5000"

    healthcheck:
      test: ["CMD", "python", "-c", "import socket; socket.create_connection(('localhost',5000),2)"]
      interval: 30s
      timeout: 10s
      retries: 5

  ####################################################
  # Spring Boot Backend
  ####################################################
  backend:
    build:
      context: ./ai-tutormatch

    container_name: ai-backend

    restart: unless-stopped

    depends_on:
      postgres:
        condition: service_healthy
      ml:
        condition: service_started

    expose:
      - "8080"

    environment:

      SPRING_PROFILES_ACTIVE: prod

      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/ai_tutormatch
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: password

      ML_SERVICE_URL: http://ml:5000

  ####################################################
  # React + Nginx
  ####################################################
  frontend:
    build:
      context: ./ai-tutormatchui

    container_name: ai-frontend

    restart: unless-stopped

    depends_on:
      - backend

    ports:
      - "80:80"

volumes:

  postgres_data: