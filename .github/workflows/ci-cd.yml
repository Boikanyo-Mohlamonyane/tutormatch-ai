name: AI TutorMatch CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  backend-build:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: ai_tutormatch_db
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: root
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    defaults:
      run:
        working-directory: ai-tutormatch
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 25

      - name: Grant Execute Permission
        run: chmod +x mvnw

      - name: Run Tests
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/ai_tutormatch_db
          SPRING_DATASOURCE_USERNAME: postgres
          SPRING_DATASOURCE_PASSWORD: root
        run: ./mvnw test

      - name: Build Spring Boot App
        run: ./mvnw clean package -DskipTests

      - name: Upload Backend JAR Artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-jar
          path: ai-tutormatch/target/*.jar

  frontend-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ai-tutormatch-ui
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Dependencies
        run: npm ci

      - name: Build React App
        run: npm run build

  ml-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: AI-TutorMatch-ML
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Tests 
        run: echo "No ML tests defined yet"

  docker:
    needs: [backend-build, frontend-build, ml-build]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Download Backend JAR Artifact
        uses: actions/download-artifact@v4
        with:
          name: backend-jar
          path: ai-tutormatch/target

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Frontend Docker Image
        run: docker build --no-cache -t ${{ secrets.DOCKER_USERNAME }}/ai-tutormatch-frontend:latest -f ai-tutormatch-ui/Dockerfile ai-tutormatch-ui

      - name: Build ML Docker Image
        run: docker build --no-cache -t ${{ secrets.DOCKER_USERNAME }}/ai-tutormatch-ml:latest -f AI-TutorMatch-ML/Dockerfile AI-TutorMatch-ML

      - name: Build Backend Docker Image
        run: docker build --no-cache -t ${{ secrets.DOCKER_USERNAME }}/ai-tutormatch-backend:latest -f ai-tutormatch/Dockerfile ai-tutormatch

      - name: Push Backend Image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/ai-tutormatch-backend:latest

      - name: Push Frontend Image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/ai-tutormatch-frontend:latest

      - name: Push ML Image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/ai-tutormatch-ml:latest

      - name: Clean up Docker (Runner)
        run: docker system prune -af

      - name: Delete Old Tags from Docker Hub
        run: |
          repos=("ai-tutormatch-backend" "ai-tutormatch-frontend" "ai-tutormatch-ml")
          for repo in "${repos[@]}"; do
            echo "Cleaning old tags for $repo..."
            response=$(curl -s -u "${{ secrets.DOCKER_USERNAME }}:${{ secrets.DOCKER_PASSWORD }}" \
              "https://hub.docker.com/v2/repositories/${{ secrets.DOCKER_USERNAME }}/$repo/tags/?page_size=100")

            tags=$(echo "$response" | jq -r '.results[].name' | grep -v '^latest$' || true)

            if [ -z "$tags" ]; then
              echo "No old tags found for $repo"
              continue
            fi

            for tag in $tags; do
              echo "Deleting $repo:$tag"
              status=$(curl -s -o /dev/null -w "%{http_code}" \
                -u "${{ secrets.DOCKER_USERNAME }}:${{ secrets.DOCKER_PASSWORD }}" \
                -X DELETE "https://hub.docker.com/v2/repositories/${{ secrets.DOCKER_USERNAME }}/$repo/tags/$tag/")
              if [ "$status" -eq 204 ]; then
                echo "Successfully deleted $repo:$tag"
              else
                echo "Failed to delete $repo:$tag (HTTP $status), skipping..."
              fi
            done
          done

  deploy:
    needs: docker
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/tutormatch
            echo "POSTGRES_PASSWORD=root" > .env
            sudo docker compose -f docker-compose.prod.yml pull
            sudo docker compose -f docker-compose.prod.yml up -d
