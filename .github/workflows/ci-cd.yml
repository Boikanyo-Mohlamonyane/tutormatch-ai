name: AI TutorMatch CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  backend-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 25

      - name: Grant Execute Permission
        run: chmod +x mvnw

      - name: Run Tests
        run: ./mvnw test

      - name: Build Spring Boot App
        run: ./mvnw clean package -DskipTests

  frontend-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: npm ci

      - name: Build React App
        run: npm run build

  ml-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ml
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Tests (if any)
        run: |
          echo "No ML tests defined yet"

  docker:
    needs:
      - backend-build
      - frontend-build
      - ml-build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Backend Docker Image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/ai-tutormatch-backend:latest ./backend

      - name: Build Frontend Docker Image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/ai-tutormatch-frontend:latest ./frontend

      - name: Build ML Docker Image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/ai-tutormatch-ml:latest ./ml

      - name: Push Backend Image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/ai-tutormatch-backend:latest

      - name: Push Frontend Image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/ai-tutormatch-frontend:latest

      - name: Push ML Image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/ai-tutormatch-ml:latest
