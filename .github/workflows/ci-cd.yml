name: AI TutorMatch CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  backend-build:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: ai_tutormatch_db
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: root
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    defaults:
      run:
        working-directory: ai-tutormatch
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 25

      - name: Grant Execute Permission
        run: chmod +x mvnw

      - name: Run Tests
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/ai_tutormatch_db
          SPRING_DATASOURCE_USERNAME: postgres
          SPRING_DATASOURCE_PASSWORD: root
        run: ./mvnw test

      - name: Build Spring Boot App
        run: ./mvnw clean package -DskipTests

  frontend-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ai-tutormatch-ui
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Dependencies
        run: npm ci

      - name: Build React App
        run: npm run build

  ml-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: AI-TutorMatch-ML
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Tests (if any)
        run: echo "No ML tests defined yet"

  docker:
    needs: [backend-build, frontend-build, ml-build]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Debug Repo Structure
        run: ls -R

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Frontend Docker Image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/ai-tutormatch-frontend:latest -f ai-tutormatch-ui/Dockerfile ai-tutormatch-ui

      - name: Test Frontend Container
        run: docker run --rm -d -p 3000:80 ${{ secrets.DOCKER_USERNAME }}/ai-tutormatch-frontend:latest && sleep 10 && docker ps -a

      - name: Build ML Docker Image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/ai-tutormatch-ml:latest -f AI-TutorMatch-ML/Dockerfile AI-TutorMatch-ML

      - name: Test ML Container
        run: docker run --rm -d -p 5000:5000 ${{ secrets.DOCKER_USERNAME }}/ai-tutormatch-ml:latest && sleep 10 && docker ps -a

      - name: Build Backend Docker Image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/ai-tutormatch-backend:latest -f ai-tutormatch/Dockerfile ai-tutormatch

      - name: Test Backend Container
        run: docker run --rm -d -p 8080:8080 ${{ secrets.DOCKER_USERNAME }}/ai-tutormatch-backend:latest && sleep 10 && docker ps -a

      - name: Push Backend Image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/ai-tutormatch-backend:latest

      - name: Push Frontend Image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/ai-tutormatch-frontend:latest

      - name: Push ML Image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/ai-tutormatch-ml:latest
