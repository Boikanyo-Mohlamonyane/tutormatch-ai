name: AI TutorMatch CI/CD Pipeline

on:
push:
branches:
- main

pull_request:
branches:
- main

jobs:

backend-build:
runs-on: ubuntu-latest


defaults:
  run:
    working-directory: backend

steps:

  - name: Checkout Code
    uses: actions/checkout@v4

  - name: Set up Java 21
    uses: actions/setup-java@v4
    with:
      distribution: temurin
      java-version: 21

  - name: Grant Execute Permission
    run: chmod +x mvnw

  - name: Run Tests
    run: ./mvnw test

  - name: Build Spring Boot App
    run: ./mvnw clean package -DskipTests


frontend-build:
runs-on: ubuntu-latest


defaults:
  run:
    working-directory: frontend

steps:

  - name: Checkout Code
    uses: actions/checkout@v4

  - name: Setup Node.js
    uses: actions/setup-node@v4
    with:
      node-version: 20

  - name: Install Dependencies
    run: npm install

  - name: Build React App
    run: npm run build


docker:
needs:
- backend-build
- frontend-build


runs-on: ubuntu-latest

steps:

  - name: Checkout Repository
    uses: actions/checkout@v4

  - name: Log in to Docker Hub
    uses: docker/login-action@v3
    with:
      username: ${{ secrets.DOCKER_USERNAME }}
      password: ${{ secrets.DOCKER_PASSWORD }}

  - name: Build Backend Docker Image
    run: |
      docker build -t ${{ secrets.DOCKER_USERNAME }}/aitutormatch-backend ./backend

  - name: Build Frontend Docker Image
    run: |
      docker build -t ${{ secrets.DOCKER_USERNAME }}/aitutormatch-frontend ./frontend

  - name: Push Backend Image
    run: |
      docker push ${{ secrets.DOCKER_USERNAME }}/aitutormatch-backend

  - name: Push Frontend Image
    run: |
      docker push ${{ secrets.DOCKER_USERNAME }}/aitutormatch-frontend

